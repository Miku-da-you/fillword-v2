<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>填词大作战 - 玩家端</title>
<link rel="stylesheet" href="styles/global.css">
<style>
/* Player 专属 */
.page-join .code-input {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin: 24px 0;
}
.page-join .code-input input {
  width: 56px;
  height: 60px;
  background: var(--bg-input);
  border: 2px solid var(--accent);
  border-radius: 12px;
  color: var(--gold);
  font-size: 26px;
  font-weight: bold;
  text-align: center;
  letter-spacing: 4px;
  outline: none;
}
.page-join .code-input input:focus {
  border-color: var(--accent-light);
  box-shadow: 0 0 12px rgba(233, 69, 96, 0.4);
}

.name-field {
  margin-top: 16px;
}
.name-field label {
  display: block;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.page-fill .template-title {
  font-size: 16px;
  color: var(--accent-light);
  margin-bottom: 4px;
}
.page-fill .template-desc {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 20px;
}
.page-fill .fill-group {
  margin-bottom: 16px;
}
.page-fill .fill-group label {
  font-size: 13px;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 6px;
}
.page-fill .fill-group input {
  width: 100%;
  padding: 13px 16px;
  background: var(--bg-input);
  border: 2px solid var(--border);
  border-radius: 10px;
  color: #fff;
  font-size: 15px;
  outline: none;
}
.page-fill .fill-group input:focus {
  border-color: var(--accent);
}
.page-fill .fill-group input::placeholder {
  color: #555;
}

.page-result .result-card {
  background: var(--bg-secondary);
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}
.page-result .result-card .template-badge {
  font-size: 12px;
  color: var(--accent);
  display: inline-block;
  border: 1px solid var(--accent);
  border-radius: 20px;
  padding: 3px 12px;
  margin-bottom: 12px;
}
.page-result .result-card h2 {
  font-size: 18px;
  color: var(--gold);
  margin-bottom: 16px;
}
.page-result .result-script {
  font-size: 14px;
  line-height: 2;
  color: #fff;
  white-space: pre-wrap;
  word-break: break-all;
}
.page-result .players-section {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.page-result .players-section h4 {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
.page-result .players-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.page-result .players-tags span {
  background: var(--bg-input);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  color: var(--text-secondary);
}
</style>
</head>
<body>

<!-- 页面1：输入房间号 -->
<div id="page-join" class="page active page-enter page-join">
  <div class="page-header">
    <div class="logo">🎭 FILLWORD</div>
    <h1>加入房间</h1>
    <p class="subtitle">输入朋友发给你的房间号</p>
  </div>
  
  <div class="card">
    <div class="code-input">
      <input type="text" maxlength="1" id="code1" oninput="handleCodeInput(this, 'code2')" onkeydown="handleCodeBack(this, event, 'code1')" autofocus>
      <input type="text" maxlength="1" id="code2" oninput="handleCodeInput(this, 'code3')" onkeydown="handleCodeBack(this, event, 'code2')">
      <input type="text" maxlength="1" id="code3" oninput="handleCodeInput(this, 'code4')" onkeydown="handleCodeBack(this, event, 'code3')">
      <input type="text" maxlength="1" id="code4" onkeydown="handleCodeBack(this, event, 'code4')">
    </div>
    
    <div class="name-field">
      <label>你的名字（结果页会显示）</label>
      <input type="text" id="playerName" placeholder="比如：小明" maxlength="20" autocomplete="off">
    </div>
    
    <button class="btn btn-primary" id="joinBtn" onclick="joinRoom()" style="margin-top:20px">
      加入游戏
    </button>
  </div>
</div>

<!-- 页面2：填词 -->
<div id="page-fill" class="page page-fill">
  <div class="card" style="margin-bottom:16px">
    <div class="template-title" id="templateTitle">剧本名称</div>
    <div class="template-desc">请依次填写以下内容</div>
    <div id="fieldsContainer"></div>
  </div>
  <button class="btn btn-primary" onclick="submitAnswers()">提交答案 ✨</button>
  <button class="btn btn-ghost" onclick="leaveRoom()" style="margin-top:10px;text-align:center;width:100%">
    退出房间
  </button>
</div>

<!-- 页面3：等待结果 -->
<div id="page-waiting" class="page">
  <div class="card wait-box">
    <span class="spinner">⏳</span>
    <h2>答案已提交！</h2>
    <p id="waitMsg">等待主持人公布结果...</p>
  </div>
  <button class="btn btn-ghost" onclick="leaveRoom()" style="margin-top:16px;text-align:center;width:100%">
    退出房间
  </button>
</div>

<!-- 页面4：看结果 -->
<div id="page-result" class="page page-result">
  <div class="page-header">
    <div class="logo">🎭 FILLWORD</div>
    <h1>剧本已生成</h1>
  </div>
  
  <div class="result-card" id="resultCard">
    <span class="template-badge" id="resultTemplateBadge">剧本名称</span>
    <h2 id="resultTitle">完整剧本</h2>
    <div class="result-script" id="resultScript"></div>
    <div class="players-section">
      <h4>参与玩家</h4>
      <div class="players-tags" id="resultPlayers"></div>
    </div>
  </div>
  
  <div class="share-row">
    <button class="btn btn-secondary" onclick="shareImage()">📸 保存图片</button>
    <button class="btn btn-primary" onclick="restartGame()">再来一局</button>
  </div>
</div>

<!-- 页面5：错误 -->
<div id="page-error" class="page">
  <div class="card error-box">
    <span class="icon" style="font-size:48px;display:block;text-align:center;margin-bottom:12px">❌</span>
    <h2 style="text-align:center;font-size:17px;margin-bottom:8px">房间号不存在</h2>
    <p style="text-align:center;font-size:13px;color:var(--text-secondary)" id="errorMsg">请检查房间号是否正确</p>
    <button class="btn btn-primary" onclick="showPage('join')" style="margin-top:20px">重新输入</button>
  </div>
</div>

<!-- 加载中 -->
<div id="loading" style="position:fixed;inset:0;background:var(--bg-primary);display:flex;align-items:center;justify-content:center;z-index:9999">
  <div style="text-align:center">
    <div style="font-size:40px;margin-bottom:16px">⏳</div>
    <div style="font-size:14px;color:var(--text-secondary)">连接服务器中...</div>
  </div>
</div>

<script src="scripts/socket-client.js"></script>
<script src="scripts/templates.js"></script>
<script>
// currentRoomId from socket-client.js
let currentTemplate = null;
// currentPlayerId from socket-client.js
let checkInterval = null;

// ============================================================
// 初始化
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  try {
    await SocketSync.connect();
    await Promise.resolve();
    document.getElementById('loading').style.display = 'none';
    console.log('Socket.IO 已连接');
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    console.warn('连接服务器失败:', e.message);
    alert('连接服务器失败，请关网后重试。');
  }
});

// ============================================================
// 页面控制
// ============================================================
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ============================================================
// 房间号输入
// ============================================================
function handleCodeInput(current, nextId) {
  const val = current.value.toUpperCase();
  current.value = val;
  if (val && val.length === 1) {
    const next = document.getElementById(nextId);
    if (next) next.focus();
  }
}

function handleCodeBack(current, e, id) {
  if (e.key === 'Backspace' && current.value === '') {
    const num = parseInt(id.replace('code', ''));
    if (num > 1) {
      const prev = document.getElementById('code' + (num - 1));
      if (prev) prev.focus();
    }
  }
}

function getRoomCode() {
  return ['code1', 'code2', 'code3', 'code4']
    .map(id => document.getElementById(id).value)
    .join('')
    .toUpperCase();
}

// ============================================================
// 加入房间
// ============================================================
async function joinRoom() {
  const code = getRoomCode();
  const name = document.getElementById('playerName').value.trim();
  
  if (code.length < 4) {
    showToast('请输入4位房间号');
    return;
  }
  if (!name) {
    showToast('请输入你的名字');
    return;
  }
  
  try {
    const roomData = await SocketSync.joinRoom(code, name);
    currentRoomId = code;
    console.log('joinRoom returned:', JSON.stringify(roomData));
    const tIdx = roomData.templateIndex;
    if (tIdx === undefined || !TEMPLATES[tIdx]) {
      showToast('获取模板失败');
      return;
    }
    currentTemplate = TEMPLATES[tIdx];
    
    // 渲染填词表单
    document.getElementById('templateTitle').textContent = currentTemplate.title;
    const container = document.getElementById('fieldsContainer');
    container.innerHTML = currentTemplate.fields.map(f => `
      <div class="fill-group">
        <label>${f.label}</label>
        <input type="text" id="field_${f.key}" placeholder="输入..." autocomplete="off">
      </div>
    `).join('');
    
    showPage('fill');
  } catch(e) {
    if (e.message === 'ROOM_NOT_FOUND') {
      showPage('error');
    } else {
      showToast('连接失败，请重试');
      console.error(e);
    }
  }
}

// ============================================================
// 提交答案
// ============================================================
async function submitAnswers() {
  if (!currentTemplate || !currentRoomId) return;
  
  const answers = {};
  let allFilled = true;
  
  for (const field of currentTemplate.fields) {
    const val = document.getElementById('field_' + field.key).value.trim();
    if (!val) {
      allFilled = false;
      break;
    }
    answers[field.key] = val;
  }
  
  if (!allFilled) {
    showToast('还有空白没填哦～');
    return;
  }
  
  try {
    await SocketSync.submitAnswers(currentRoomId, answers);
    showPage('waiting');
    
    // 开始轮询检查是否生成结果
    startResultPolling();
  } catch(e) {
    showToast('提交失败，请重试');
    console.error(e);
  }
}

function startResultPolling() {
  if (checkInterval) clearInterval(checkInterval);
  
  checkInterval = setInterval(async () => {
    try {
      // 检查房间状态
      const snap = await firebase.database().ref('rooms/' + currentRoomId + '/status').once('value');
      if (snap.val() === 'generated') {
        clearInterval(checkInterval);
        loadResult();
      }
    } catch(e) {}
  }, 3000);
}

async function loadResult() {
  try {
    // 获取房间数据和所有玩家答案
    const roomSnap = await firebase.database().ref('rooms/' + currentRoomId).once('value');
    const roomData = roomSnap.val();
    
    if (!roomData) {
      showToast('结果加载失败');
      return;
    }
    
    currentTemplate = TEMPLATES[roomData.templateIndex];
    
    // 收集所有答案
    const playersSnap = await firebase.database().ref('rooms/' + currentRoomId + '/players').once('value');
    const allAnswers = {};
    const playerNames = [];
    
    playersSnap.forEach(child => {
      const player = child.val();
      if (player.name) playerNames.push(player.name);
      if (player.answers) {
        Object.assign(allAnswers, player.answers);
      }
    });
    
    // 填充剧本
    let script = currentTemplate.script;
    for (const [key, val] of Object.entries(allAnswers)) {
      script = script.replace(new RegExp('\\{' + key + '\\}', 'g'), val);
    }
    
    // 更新UI
    document.getElementById('resultTemplateBadge').textContent = currentTemplate.title;
    document.getElementById('resultScript').textContent = script;
    document.getElementById('resultPlayers').innerHTML = playerNames.map(n => 
      `<span>👤 ${escapeHtml(n)}</span>`
    ).join('');
    
    showPage('result');
  } catch(e) {
    console.error('加载结果失败:', e);
    showToast('结果加载失败');
  }
}

// ============================================================
// 退出
// ============================================================
async function leaveRoom() {
  if (currentRoomId) {
    try {
      await SocketSync.leaveRoom(currentRoomId);
    } catch(e) {}
  }
  if (checkInterval) clearInterval(checkInterval);
  currentRoomId = null;
  currentTemplate = null;
  ['code1', 'code2', 'code3', 'code4'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('playerName').value = '';
  showPage('join');
}

function restartGame() {
  leaveRoom();
}

// ============================================================
// 截图分享
// ============================================================
async function shareImage() {
  try {
    showToast('截图功能已禁用');
  } catch(e) {
    showToast('截图失败，请重试');
    console.error(e);
  }
}

// ============================================================
// 工具
// ============================================================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
