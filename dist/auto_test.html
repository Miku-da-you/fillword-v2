<!DOCTYPE html>
<html>
<head>
<title>Auto Test</title>
</head>
<body>
<h1 id="status">Waiting...</h1>
<script src="scripts/socket.io.min.js"></script>
<script src="scripts/socket-client.js"></script>
<script>
document.getElementById('status').textContent = 'Scripts loaded';

// Auto-join after 1 second
setTimeout(async function() {
    document.getElementById('status').textContent = 'Attempting join...';
    try {
        var result = await SocketSync.joinRoom('TEST', 'AutoBot');
        document.getElementById('status').textContent = 'SUCCESS: ' + JSON.stringify(result);
    } catch(e) {
        document.getElementById('status').textContent = 'ERROR: ' + e.message;
    }
}, 1000);
</script>
</body>
</html>
